<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <meta name="theme-color" content="#1d6b3a" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="default" />
    <link rel="manifest" href="./manifest.webmanifest" />
    <link rel="icon" href="./icons/fst-app-icon.png" />
    <link rel="apple-touch-icon" href="./icons/fst-app-icon.png" />
    <link rel="stylesheet" href="./styles.css?v=2026.03.19.16" />
    <title>FST INV</title>
  </head>
  <body>
    <div id="root"></div>
    <script>
      window.addEventListener("error", function (event) {
        var root = document.getElementById("root");
        if (!root || root.childElementCount) return;
        var box = document.createElement("div");
        box.style.maxWidth = "980px";
        box.style.margin = "24px auto";
        box.style.padding = "16px";
        box.style.border = "1px solid rgba(23, 32, 47, 0.12)";
        box.style.borderRadius = "16px";
        box.style.background = "rgba(255,255,255,0.96)";
        box.textContent = "App startup error: " + (event.message || "Unknown error");
        root.replaceChildren(box);
      });
    </script>
    <script type="module" src="./app.js?v=2026.03.19.16"></script>
  </body>
</html>
